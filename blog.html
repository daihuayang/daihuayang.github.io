<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博客 · 夜白</title>
  <meta name="description" content="夜白的博客 - 分享 AI 产品设计与实践经验">
  <meta name="theme-color" content="#0B0B0E">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="./assets/logo.png">

  <!-- Open Graph -->
  <meta property="og:title" content="博客 · 夜白">
  <meta property="og:description" content="分享 AI 产品设计与实践经验">
  <meta property="og:type" content="website">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/blog.css">
</head>
<body>
  <!-- =================== BACKGROUND LAYERS =================== -->
  <div class="bg-halftone" aria-hidden="true"></div>
  <canvas id="particles" aria-hidden="true"></canvas>
  <div class="bg-grain" aria-hidden="true"></div>
  <div class="bg-vignette" aria-hidden="true"></div>

  <!-- =================== SHELL =================== -->
  <div class="shell shell--page">

    <!-- Header -->
    <header class="nav">
      <a href="/" class="nav__brand" aria-label="夜白 · AI">
        <span class="brand-logo brand-logo--horizontal"></span>
      </a>
      <div class="nav__links">
        <a href="/" class="nav__link">Home</a>
        <a href="/blog.html" class="nav__link nav__link--active">Blog</a>
      </div>
    </header>

    <!-- Main Content -->
    <main class="page-main">
      <!-- Page Header -->
      <section class="page-header">
        <div class="page-header__meta">
          <span class="page-header__marker"></span>
          <span class="page-header__label">§ 文章列表</span>
        </div>
        <h1 class="page-header__title">Blog</h1>
        <p class="page-header__desc">探索 AI 产品设计的思考与实践</p>
      </section>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <div class="filter-bar__group">
          <button class="filter-btn filter-btn--active" data-filter="all">全部</button>
          <button class="filter-btn" data-filter="ai-product">AI 产品</button>
          <button class="filter-btn" data-filter="design">设计思维</button>
          <button class="filter-btn" data-filter="practice">实践案例</button>
          <button class="filter-btn" data-filter="thought">行业思考</button>
        </div>
        <div class="filter-bar__count">
          <span class="filter-bar__number" id="postCount">0</span>
          <span class="filter-bar__label">篇文章</span>
        </div>
      </div>

      <!-- Blog List -->
      <div class="blog-list" id="blogList">
        <!-- 文章将通过 JS 从 posts.json 加载 -->
        <div class="posts-loading">
          <p>加载中...</p>
        </div>
      </div>

      <!-- Load More -->
      <div class="load-more">
        <button class="load-more__btn" id="loadMoreBtn">
          <span>加载更多</span>
          <svg width="14" height="10" viewBox="0 0 14 10" aria-hidden="true">
            <path d="M7 0v8m-3-3 3 3 3-3" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="square"/>
          </svg>
        </button>
      </div>
    </main>

    <!-- Footer -->
    <footer class="legal legal--page">
      <span class="legal__dot"></span>
      <span>© 2026 夜白</span>
      <span class="legal__divider"></span>
      <span>用心做 AI 产品</span>
    </footer>

  </div>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/blog.js"></script>
</body>
</html>
