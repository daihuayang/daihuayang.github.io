<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章详情 · 夜白</title>
  <meta name="description" content="夜白的博客文章">
  <meta name="theme-color" content="#0B0B0E">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="./assets/logo.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/blog.css">
</head>
<body>
  <!-- =================== BACKGROUND LAYERS =================== -->
  <div class="bg-halftone" aria-hidden="true"></div>
  <canvas id="particles" aria-hidden="true"></canvas>
  <div class="bg-grain" aria-hidden="true"></div>
  <div class="bg-vignette" aria-hidden="true"></div>

  <!-- =================== SHELL =================== -->
  <div class="shell shell--page">

    <!-- Header -->
    <header class="nav">
      <a href="/" class="nav__brand" aria-label="夜白 · AI 产品经理">
        <span class="brand-logo brand-logo--horizontal"></span>
      </a>
      <div class="nav__links">
        <a href="/blog.html" class="nav__link nav__link--active">Blog</a>
        <a href="/" class="nav__link">Home</a>
      </div>
    </header>

    <!-- Main Content -->
    <main class="page-main page-main--post">
      <!-- Back Link -->
      <a href="/blog.html" class="back-link">
        <svg width="16" height="12" viewBox="0 0 16 12" aria-hidden="true">
          <path d="M16 6H2m4-4-4 4 4 4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="square"/>
        </svg>
        <span>返回文章列表</span>
      </a>

      <!-- Article Header -->
      <header class="post-header">
        <div class="post-header__meta">
          <span class="post-header__category" id="postCategory">加载中...</span>
          <span class="post-header__date" id="postDate">--</span>
        </div>
        <h1 class="post-header__title" id="postTitle">加载中...</h1>
        <div class="post-header__stats">
          <span class="post-header__stat">
            <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
              <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.2" fill="none"/>
              <path d="M8 4v4l3 2" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="square"/>
            </svg>
            <span id="readTime">-- 分钟阅读</span>
          </span>
          <span class="post-header__divider"></span>
          <span class="post-header__stat" id="viewCount">0 次阅读</span>
        </div>
      </header>

      <!-- Article Content -->
      <article class="post-content" id="postContent">
        <div class="content-loading">
          <p>加载文章内容...</p>
        </div>
      </article>

      <!-- Post Navigation -->
      <nav class="post-nav" id="postNav">
        <a href="#" class="post-nav__link post-nav__link--prev" id="prevPost">
          <span class="post-nav__label">
            <svg width="14" height="10" viewBox="0 0 14 10" aria-hidden="true">
              <path d="M14 5H2m4-4-4 4 4 4" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="square"/>
            </svg>
            上一篇
          </span>
          <span class="post-nav__title" id="prevPostTitle">-</span>
        </a>
        <a href="#" class="post-nav__link post-nav__link--next" id="nextPost">
          <span class="post-nav__label">
            下一篇
            <svg width="14" height="10" viewBox="0 0 14 10" aria-hidden="true">
              <path d="M0 5h12m-4-4 4 4-4 4" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="square"/>
            </svg>
          </span>
          <span class="post-nav__title" id="nextPostTitle">-</span>
        </a>
      </nav>

      <!-- Share Section -->
      <section class="share-section">
        <h3 class="share-section__title">分享这篇文章</h3>
        <div class="share-buttons">
          <button class="share-btn" data-platform="twitter" aria-label="分享到 Twitter">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
          </button>
          <button class="share-btn" data-platform="weibo" aria-label="分享到微博">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M10.098 20.323c-3.977.391-7.414-1.406-7.672-4.02-.259-2.609 2.759-5.047 6.74-5.441 3.979-.394 7.413 1.404 7.671 4.018.259 2.6-2.759 5.049-6.739 5.443zM9.05 17.219c-.384.616-1.208.884-1.829.602-.612-.279-.793-.991-.406-1.593.379-.595 1.176-.861 1.793-.601.622.263.82.972.442 1.592zm1.27-1.627c-.141.237-.449.353-.689.253-.236-.09-.313-.361-.177-.586.138-.227.436-.346.672-.24.239.09.315.36.194.573zm.176-2.719c-1.893-.493-4.033.45-4.857 2.118-.836 1.704-.026 3.591 1.886 4.21 1.983.64 4.318-.341 5.132-2.179.8-1.793-.201-3.642-2.161-4.149zm7.563-1.224c-.346-.105-.579-.18-.401-.649.386-1.031.425-1.922.008-2.557-.781-1.19-2.924-1.126-5.354-.034 0 0-.767.334-.571-.271.376-1.217.32-2.234-.266-2.823-1.331-1.335-4.869.047-7.91 3.087C1.167 10.845 0 13.071 0 15.012 0 18.618 4.387 21 8.677 21c5.631 0 9.381-3.264 9.381-5.856 0-1.571-1.326-2.462-1.999-2.495z"/>
            </svg>
          </button>
          <button class="share-btn" data-platform="copy" aria-label="复制链接">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
          </button>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="legal legal--page">
      <span class="legal__dot"></span>
      <span>© 2026 夜白</span>
      <span class="legal__divider"></span>
      <span>用心做 AI 产品</span>
    </footer>

  </div>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/post.js"></script>
</body>
</html>
