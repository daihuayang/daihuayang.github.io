<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发布文章 · 夜小白</title>
  <meta name="description" content="发布新文章">
  <meta name="theme-color" content="#0B0B0E">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="./assets/logo.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/blog.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <!-- =================== BACKGROUND LAYERS =================== -->
  <div class="bg-halftone" aria-hidden="true"></div>
  <canvas id="particles" aria-hidden="true"></canvas>
  <div class="bg-grain" aria-hidden="true"></div>
  <div class="bg-vignette" aria-hidden="true"></div>

  <!-- =================== SHELL =================== -->
  <div class="shell shell--page">

    <!-- Header -->
    <header class="nav">
      <a href="/" class="nav__brand" aria-label="夜小白 · AI 产品经理">
        <span class="brand-logo brand-logo--horizontal"></span>
      </a>
      <div class="nav__links">
        <a href="/blog.html" class="nav__link">Blog</a>
        <a href="/" class="nav__link">Home</a>
      </div>
    </header>

    <!-- Main Content -->
    <main class="page-main">
      <!-- Page Header -->
      <section class="page-header">
        <div class="page-header__meta">
          <span class="page-header__marker"></span>
          <span class="page-header__label">§ 内容管理</span>
        </div>
        <h1 class="page-header__title">发布文章</h1>
        <p class="page-header__desc">创建新的博客文章</p>
      </section>

      <!-- Admin Tabs -->
      <div class="admin-tabs">
        <button class="admin-tab admin-tab--active" data-tab="editor">写文章</button>
        <button class="admin-tab" data-tab="posts">文章管理</button>
        <button class="admin-tab" data-tab="settings">设置</button>
      </div>

      <!-- Editor Tab -->
      <div class="admin-panel admin-panel--active" id="editorPanel">
        <form class="post-form" id="postForm">
          <!-- 标题 -->
          <div class="form-group">
            <label class="form-label" for="postTitle">文章标题</label>
            <input type="text" class="form-input" id="postTitle" name="title" placeholder="输入文章标题..." required>
          </div>

          <!-- 分类和日期 -->
          <div class="form-row">
            <div class="form-group form-group--half">
              <label class="form-label" for="postCategory">分类</label>
              <select class="form-select" id="postCategory" name="category" required>
                <option value="">选择分类</option>
                <option value="ai-product">AI 产品</option>
                <option value="design">设计思维</option>
                <option value="practice">实践案例</option>
                <option value="thought">行业思考</option>
              </select>
            </div>
            <div class="form-group form-group--half">
              <label class="form-label" for="postDate">发布日期</label>
              <input type="date" class="form-input" id="postDate" name="date" required>
            </div>
          </div>

          <!-- 摘要 -->
          <div class="form-group">
            <label class="form-label" for="postExcerpt">文章摘要</label>
            <textarea class="form-textarea form-textarea--small" id="postExcerpt" name="excerpt" placeholder="简短描述文章内容..." rows="2" required></textarea>
          </div>

          <!-- 正文 -->
          <div class="form-group">
            <label class="form-label" for="postContent">
              文章内容
              <span class="form-hint">支持 Markdown 格式</span>
            </label>
            <div class="editor-toolbar">
              <button type="button" class="toolbar-btn" data-action="bold" title="粗体">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/>
                  <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/>
                </svg>
              </button>
              <button type="button" class="toolbar-btn" data-action="italic" title="斜体">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="19" y1="4" x2="10" y2="4"/>
                  <line x1="14" y1="20" x2="5" y2="20"/>
                  <line x1="15" y1="4" x2="9" y2="20"/>
                </svg>
              </button>
              <button type="button" class="toolbar-btn" data-action="heading" title="标题">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M6 12h12M6 20V4m12 16V4"/>
                </svg>
              </button>
              <button type="button" class="toolbar-btn" data-action="quote" title="引用">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V21M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3"/>
                </svg>
              </button>
              <button type="button" class="toolbar-btn" data-action="list" title="列表">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="8" y1="6" x2="21" y2="6"/>
                  <line x1="8" y1="12" x2="21" y2="12"/>
                  <line x1="8" y1="18" x2="21" y2="18"/>
                  <line x1="3" y1="6" x2="3.01" y2="6"/>
                  <line x1="3" y1="12" x2="3.01" y2="12"/>
                  <line x1="3" y1="18" x2="3.01" y2="18"/>
                </svg>
              </button>
              <button type="button" class="toolbar-btn" data-action="link" title="链接">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                  <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                </svg>
              </button>
              <button type="button" class="toolbar-btn" data-action="code" title="代码">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="16 18 22 12 16 6"/>
                  <polyline points="8 6 2 12 8 18"/>
                </svg>
              </button>
            </div>
            <textarea class="form-textarea form-textarea--editor" id="postContent" name="content" placeholder="开始写作..." rows="20" required></textarea>
          </div>

          <!-- 阅读时间 -->
          <div class="form-group form-group--inline">
            <label class="form-label" for="readTime">预计阅读时间</label>
            <input type="text" class="form-input form-input--small" id="readTime" name="readTime" placeholder="如：8 分钟" value="5 分钟">
          </div>

          <!-- 操作按钮 -->
          <div class="form-actions">
            <button type="button" class="btn btn--secondary" id="previewBtn">预览</button>
            <button type="button" class="btn btn--secondary" id="saveDraftBtn">保存草稿</button>
            <button type="submit" class="btn btn--primary">发布文章</button>
          </div>
        </form>
      </div>

      <!-- Posts Tab -->
      <div class="admin-panel" id="postsPanel">
        <div class="posts-list" id="postsList">
          <!-- 文章列表将通过 JS 加载 -->
          <div class="posts-empty">
            <p>暂无已发布文章</p>
          </div>
        </div>
      </div>

      <!-- Settings Tab -->
      <div class="admin-panel" id="settingsPanel">
        <div class="settings-section">
          <h3 class="settings-title">发布设置</h3>
          <div class="form-group form-group--checkbox">
            <label class="checkbox-label">
              <input type="checkbox" checked>
              <span class="checkbox-text">发布时自动同步到社交媒体</span>
            </label>
          </div>
          <div class="form-group form-group--checkbox">
            <label class="checkbox-label">
              <input type="checkbox" checked>
              <span class="checkbox-text">允许评论</span>
            </label>
          </div>
          <div class="form-group form-group--checkbox">
            <label class="checkbox-label">
              <input type="checkbox">
              <span class="checkbox-text">置顶文章</span>
            </label>
          </div>
        </div>

        <div class="settings-section">
          <h3 class="settings-title">数据管理</h3>
          <div class="settings-actions">
            <button type="button" class="btn btn--secondary" id="exportBtn">导出所有文章</button>
            <button type="button" class="btn btn--danger" id="clearBtn">清空本地数据</button>
          </div>
        </div>
      </div>

      <!-- Preview Modal -->
      <div class="modal" id="previewModal">
        <div class="modal__overlay"></div>
        <div class="modal__content">
          <div class="modal__header">
            <h3 class="modal__title">文章预览</h3>
            <button type="button" class="modal__close" id="closeModal">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
          <div class="modal__body" id="previewBody">
            <!-- 预览内容 -->
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="legal legal--page">
      <span class="legal__dot"></span>
      <span>© 2026 夜白</span>
      <span class="legal__divider"></span>
      <span>用心做 AI 产品</span>
    </footer>

  </div>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
